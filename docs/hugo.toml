baseURL = "https://gaze.ofkm.dev/"
languageCode = "en-us"
title = "Gaze"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term", "rss", "sitemap"]

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
description = "Gaze is a Pure-Go cross-platform file system watcher."

  [params.navbar]
  displayTitle = true
  displayLogo = false
  width = "wide"

  [params.page]
  width = "wide"
  displayPagination = true

  [params.theme]
  default = "system"
  displayToggle = true

  [params.search]
  type = "flexsearch"

[markup]
  [markup.highlight]
    noClasses = false
    style = "github"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = "Docs"
    pageRef = "/docs"
    weight = 1
  [[menu.main]]
    name = "Examples"
    pageRef = "/docs/examples"
    weight = 2
  [[menu.main]]
    name = "Search"
    weight = 3
    [menu.main.params]
      type = "search"

  [[menu.sidebar]]
    name = "Resources"
    weight = 1
    [menu.sidebar.params]
      type = "separator"
  [[menu.sidebar]]
    name = "Go Reference"
    url = "https://pkg.go.dev/go.ofkm.dev/gaze"
    weight = 2
