name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  bench:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run benchmarks
        shell: bash
        run: go test ./... -run=^$ -bench=. -benchmem | tee benchmark.txt

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: benchmark.txt

  publish:
    name: Publish benchmark docs
    runs-on: ubuntu-latest
    needs: bench
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v5
        with:
          path: benchmark-artifacts

      - name: Regenerate performance docs
        shell: bash
        run: |
          go run ./scripts/benchmarkdocs docs/content/docs/performance.md benchmark-artifacts/*/benchmark.txt

      - name: Create benchmark docs pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: docs/content/docs/performance.md
          branch: chore/update-benchmark-docs
          commit-message: "docs: update benchmark matrix"
          title: "docs: update benchmark matrix"
          body: |
            Refreshes the generated benchmark docs page with the latest Linux, macOS, and Windows benchmark results from the benchmark workflow.
          delete-branch: true
